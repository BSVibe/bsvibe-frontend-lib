name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - types
          - auth
          - design-tokens
          - layout
          - ui
          - api
          - i18n

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (${{ matrix.package }})
        run: pnpm --filter "@bsvibe/${{ matrix.package }}" run build

      - name: Typecheck (${{ matrix.package }})
        run: pnpm --filter "@bsvibe/${{ matrix.package }}" run typecheck

      - name: Test (${{ matrix.package }})
        run: pnpm --filter "@bsvibe/${{ matrix.package }}" run test
