name: Storybook (GitHub Pages)

# Decision #13 (BSVibe_Execution_Lockin §3): Storybook host = GitHub Pages.
# Phase A: build @bsvibe/ui Storybook → deploy to GitHub Pages on every
# push to `main` (and via manual dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: storybook
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dependent packages (design-tokens)
        # @bsvibe/ui resolves @bsvibe/design-tokens types via dist/, so the
        # token package must be built before Storybook compiles the UI.
        run: pnpm --filter "@bsvibe/design-tokens" run build

      - name: Build Storybook
        run: pnpm --filter "@bsvibe/ui" run build-storybook

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/ui/storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
